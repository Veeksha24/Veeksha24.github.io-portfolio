# Site Settings
title: Your Name
description: Data Scientist | ML Engineer | Your Tagline
url: https://yourusername.github.io
baseurl: "/portfolio"

# Author Info
author:
  name: Your Name
  email: you@email.com
  github: yourusername
  linkedin: yourusername
  twitter: yourusername   # optional, remove if unused
  instagram: yourusername # optional

# Navigation
nav:
  - title: about
    url: /
  - title: portfolio
    url: /projects/
  - title: publications
    url: /publications/

# Theme
remote_theme: alshedivat/al-folio
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-feed

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Footer
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>
  with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
